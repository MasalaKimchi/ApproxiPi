<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc"><title id="title">Relative wall time vs. Chudnovsky</title><desc id="desc">Values below 1 are faster than the Chudnovsky run at the same precision.</desc><style>text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}.title{font-size:22px;font-weight:700;fill:#111827}.subtitle{font-size:12px;fill:#64748b}.axis{stroke:#1f2937;stroke-width:1.4}.grid{stroke:#d7dde8;stroke-width:1}.tick{font-size:11px;fill:#64748b}.label{font-size:12px;fill:#111827}.legend{font-size:12px;fill:#111827}</style><rect width="960" height="540" fill="#fff"/><text class="title" x="40" y="38">Relative wall time vs. Chudnovsky</text><text class="subtitle" x="40" y="58">Values below 1 are faster than the Chudnovsky run at the same precision.</text><line class="grid" x1="82" y1="74" x2="82" y2="430"/><text class="tick" x="82" y="454" text-anchor="middle">1e3</text><line class="grid" x1="338" y1="74" x2="338" y2="430"/><text class="tick" x="338" y="454" text-anchor="middle">1e4</text><line class="grid" x1="594" y1="74" x2="594" y2="430"/><text class="tick" x="594" y="454" text-anchor="middle">1e5</text><line class="grid" x1="850" y1="74" x2="850" y2="430"/><text class="tick" x="850" y="454" text-anchor="middle">1e6</text><line class="grid" x1="82" y1="430" x2="850" y2="430"/><text class="tick" x="72" y="434" text-anchor="end">0</text><line class="grid" x1="82" y1="358.8" x2="850" y2="358.8"/><text class="tick" x="72" y="362.8" text-anchor="end">2.16</text><line class="grid" x1="82" y1="287.6" x2="850" y2="287.6"/><text class="tick" x="72" y="291.6" text-anchor="end">4.33</text><line class="grid" x1="82" y1="216.4" x2="850" y2="216.4"/><text class="tick" x="72" y="220.4" text-anchor="end">6.49</text><line class="grid" x1="82" y1="145.2" x2="850" y2="145.2"/><text class="tick" x="72" y="149.2" text-anchor="end">8.66</text><line class="grid" x1="82" y1="74" x2="850" y2="74"/><text clas